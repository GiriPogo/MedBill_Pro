    function MiniBar({value,max,color}){
      return(
        <div style={{height:6,background:"#f1f5f9",borderRadius:99,overflow:"hidden"}}>
          <div style={{width:`${Math.min((value/max)*100,100)}%`,height:"100%",background:color,borderRadius:99,transition:"width 1s ease"}}/>

      );
    }
    function RevenueChart({data}){
      const mx=Math.max(...data.map(d=>d.billed));
      return(
        <div style={{display:"flex",alignItems:"flex-end",gap:8,height:100,padding:"0 4px"}}>
          {data.map((d,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>

                <div style={{flex:1,background:"linear-gradient(180deg,#10b981,#34d399)",borderRadius:"4px 4px 0 0",height:`${(d.collected/mx)*100}%`,minHeight:4}}/>
              </div>

            </div>

        </div>

    function Toast({message,type,onClose}){
      useEffect(()=>{const t=setTimeout(onClose,3200);return()=>clearTimeout(t);},[]);
      const c={success:"#10b981",error:"#ef4444",info:"#6366f1",warn:"#f59e0b"};
      return(
        <div style={{position:"fixed",top:64,left:"50%",transform:"translateX(-50%)",background:c[type]||c.info,color:"#fff",padding:"10px 20px",borderRadius:12,fontSize:13,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,.25)",whiteSpace:"nowrap",animation:"slideDown .3s ease"}}>

    /* ═══════════════════════════════════════════════════════════
       LOCK SCREEN
    ═══════════════════════════════════════════════════════════ */
    function LockScreen({user,pin,onUnlock,showToast}){
      const [pinInput,setPinInput]=useState("");
      const r=ROLES[user.role];
      const handleKey=(k)=>{
        if(k==="⌫"){setPinInput(p=>p.slice(0,-1));return;}
        if(k===""||pinInput.length>=4) return;
        const next=pinInput+k;
        setPinInput(next);
        if(next.length===4){
          if(!pin||next===pin){onUnlock();setPinInput("");}
          else{showToast("Incorrect PIN","error");setTimeout(()=>setPinInput(""),500);}
        }
      };
      return(
        <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif",padding:24}}>
          <div style={{textAlign:"center",marginBottom:32}}>
            <div style={{width:72,height:72,background:`${r.color}25`,border:`2px solid ${r.color}50`,borderRadius:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 14px"}}>{r.icon}</div>
            <div style={{color:"#fff",fontSize:18,fontFamily:"Syne,sans-serif",fontWeight:800,marginBottom:4}}>{user.name}</div>
            <RoleBadge roleKey={user.role}/>
            <div style={{color:"#475569",fontSize:12,marginTop:8}}>Session locked · Enter PIN to continue</div>
          </div>
          <div style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:20,padding:28,width:"100%",maxWidth:300}}>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:22}}>
              {[0,1,2,3].map(i=>(
                <div key={i} style={{width:14,height:14,borderRadius:"50%",background:pinInput.length>i?r.color:"rgba(255,255,255,.15)",transition:"background .2s"}}/>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>(
                <button key={i} onClick={()=>handleKey(k===""?"":String(k))}
                  style={{padding:"14px 8px",background:k===""?"transparent":"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,color:"#fff",fontSize:20,fontWeight:600,cursor:k===""?"default":"pointer",transition:"background .15s"}}>
                  {k}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

      const perm = ROLES[currentUser.role].permissions;
      const role = ROLES[currentUser.role];

      const showToast=(msg,type="success")=>setToast({message:msg,type});
      const resetLockTimer=()=>{
        clearTimeout(lockTimer.current);

      useEffect(()=>{resetLockTimer();return()=>clearTimeout(lockTimer.current);},[]);

      const can=(p)=>!!perm[p];

      const handleFileUpload=(files)=>{
        if(!can("documentsUpload")){showToast("Upload not permitted for your role","error");return;}
        if(!files?.length) return;
        const nd=Array.from(files).map((f,i)=>({id:`DOC-NEW-${Date.now()}-${i}`,name:f.name,type:"Uploaded",size:`${(f.size/1024/1024).toFixed(1)} MB`,date:new Date().toISOString().split("T")[0],claim:"N/A",category:"clinical"}));
        setDocs(p=>[...nd,...p]);
        showToast(`${files.length} document(s) uploaded securely`);
        setShowDocUpload(false);
      };
      const handleDownload=(doc)=>{
        const blob=new Blob([`MedBill Pro — ${doc.name}\nClaim: ${doc.claim}\nType: ${doc.type}\nSize: ${doc.size}\nDate: ${doc.date}\n\n[Placeholder content]`],{type:"text/plain"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");a.href=url;a.download=doc.name;a.click();URL.revokeObjectURL(url);
        showToast(`Downloading ${doc.name}`,"info");
      };
      const handleDeleteDoc=(id)=>{
        if(!can("documentsDelete")){showToast("Delete not permitted for your role","error");return;}
        setDocs(p=>p.filter(x=>x.id!==id));showToast("Document deleted");
      };

      const filteredClaims=CLAIMS_DATA.filter(c=>{
        const ms=!searchQ||c.patient.toLowerCase().includes(searchQ.toLowerCase())||c.id.toLowerCase().includes(searchQ.toLowerCase());
        const mf=filterStatus==="all"||c.status===filterStatus;
        return ms&&mf;
      });

      /* ── visible nav tabs per role ─────────────────────── */
      const navItems=[
        {id:"dashboard",   icon:"⬡",  label:"Dashboard",   show: can("dashboard")},
        {id:"claims",      icon:"📋", label:"Claims",       show: can("claims")},
        {id:"eligibility", icon:"⚡", label:"Eligibility",  show: can("eligibility")},
        {id:"documents",   icon:"📁", label:"Docs",         show: can("documents")},
        {id:"security",    icon:"🔐", label:"Security",     show: can("security")||can("auditFull")},
      ].filter(n=>n.show);

      if(sessionLocked) return(
        <>
          {toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}
          <LockScreen user={currentUser} pin={pin} onUnlock={()=>{setSessionLocked(false);resetLockTimer();}} showToast={showToast}/>
        </>
      );

      /* ── Header ───────────────────────────────────────── */
      const Header=()=>(
        <div style={{background:"linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%)",padding:"48px 18px 16px",position:"sticky",top:0,zIndex:100}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:10,color:"#475569",fontWeight:600,letterSpacing:1.5,textTransform:"uppercase",marginBottom:2}}>{currentUser.org}</div>
              <h1 style={{color:"#fff",fontSize:17,fontFamily:"Syne,sans-serif",margin:0}}>MedBill Pro</h1>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {can("eligibilityVerify")&&(
                <button onClick={()=>showToast("Running eligibility check…","info")} style={{width:34,height:34,borderRadius:10,background:"rgba(99,102,241,.3)",border:"1px solid rgba(99,102,241,.4)",color:"#a5b4fc",fontSize:15,cursor:"pointer"}}>⚡</button>
              )}
              <button onClick={()=>setSessionLocked(true)} style={{width:34,height:34,borderRadius:10,background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.12)",color:"#94a3b8",fontSize:15,cursor:"pointer"}}>🔒</button>
              <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,padding:"5px 10px",cursor:"pointer"}} onClick={()=>setTab("security")}>
                <div style={{width:28,height:28,borderRadius:8,background:`${role.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>{role.icon}</div>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:"#e2e8f0"}}>{currentUser.name.split(" ")[0]}</div>
                  <div style={{fontSize:9,color:role.color,fontWeight:600}}>{role.label}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );

      /* ── Bottom Nav ────────────────────────────────────── */
      const BottomNav=()=>(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(255,255,255,.95)",backdropFilter:"blur(20px)",borderTop:"1px solid #f1f5f9",padding:"10px 0 24px",display:"flex",justifyContent:"space-around",zIndex:200}}>
          {navItems.map(n=>(
            <button key={n.id} onClick={()=>{setTab(n.id);setSelectedClaim(null);setSelectedEli(null);}}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"2px 8px"}}>
              <div style={{width:42,height:30,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,background:tab===n.id?`linear-gradient(135deg,${role.color},${role.badge})`:"transparent",transition:"background .2s"}}>{n.icon}</div>
              <span style={{fontSize:9,fontWeight:700,color:tab===n.id?role.color:"#94a3b8",textTransform:"uppercase",letterSpacing:.4}}>{n.label}</span>
            </button>
          ))}
          <button onClick={onLogout} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"2px 8px"}}>
            <div style={{width:42,height:30,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🚪</div>
            <span style={{fontSize:9,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.4}}>Logout</span>
          </button>
        </div>
      );

      /* ════ DASHBOARD ════ */
      const Dashboard=()=>(
        <div style={{animation:"slideUp .3s ease"}}>
          {/* Role info banner */}
          <div style={{margin:"14px 14px 0",background:`linear-gradient(135deg,${role.color}15,${role.color}05)`,border:`1px solid ${role.color}30`,borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:40,height:40,borderRadius:10,background:`${role.color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{role.icon}</div>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>{currentUser.name} — <span style={{color:role.color}}>{role.label}</span></div>
              <div style={{fontSize:11,color:"#64748b"}}>{role.description}</div>
            </div>
          </div>

          {/* KPI grid — only for roles with revenue access */}
          {can("revenue")&&(
            <div style={{padding:"12px 14px 0"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[
                  {label:"YTD Revenue",    value:`$${(REVENUE.kpis.ytdRevenue/1000).toFixed(0)}K`,  sub:"+12.4% vs last yr",  color:"#6366f1",icon:"💰"},
                  {label:"Pending A/R",    value:`$${(REVENUE.kpis.pendingAR/1000).toFixed(1)}K`,   sub:"Avg 34 days",        color:"#f59e0b",icon:"⏳"},
                  {label:"Clean Claim %",  value:`${REVENUE.kpis.cleanClaimRate}%`,                  sub:"Target: 95%",        color:"#10b981",icon:"✓"},
                  {label:"Denial Rate",    value:`${REVENUE.kpis.denialRate}%`,                      sub:"↓ 1.2% this month",  color:"#ef4444",icon:"⚠"},
                ].map((kpi,i)=>(
                  <div key={i} style={{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 12px rgba(0,0,0,.06)",border:"1px solid #f1f5f9"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <span style={{fontSize:10,color:"#94a3b8",fontWeight:600,textTransform:"uppercase",letterSpacing:.8}}>{kpi.label}</span>
                      <span style={{fontSize:16}}>{kpi.icon}</span>
                    </div>
                    <div style={{fontSize:22,fontWeight:800,color:"#0f172a",fontFamily:"Syne,sans-serif",marginBottom:3}}>{kpi.value}</div>
                    <div style={{fontSize:11,color:kpi.color,fontWeight:600}}>{kpi.sub}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Collection rate bar */}
          {can("revenue")&&(
            <div style={{margin:"10px 14px 0",background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 12px rgba(0,0,0,.06)",border:"1px solid #f1f5f9"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <div>
                  <div style={{fontSize:10,color:"#94a3b8",fontWeight:600,textTransform:"uppercase",letterSpacing:.8}}>Collection Rate</div>
                  <div style={{fontSize:26,fontWeight:800,color:"#0f172a",fontFamily:"Syne,sans-serif"}}>{REVENUE.kpis.collectionRate}%</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>Feb Collected</div>
                  <div style={{fontSize:15,fontWeight:700,color:"#10b981"}}>${(REVENUE.kpis.totalCollected/1000).toFixed(0)}K</div>
                  <div style={{fontSize:10,color:"#94a3b8"}}>of ${(REVENUE.kpis.totalBilled/1000).toFixed(0)}K billed</div>
                </div>
              </div>
              <MiniBar value={REVENUE.kpis.totalCollected} max={REVENUE.kpis.totalBilled} color={`linear-gradient(90deg,${role.color},#10b981)`}/>
            </div>
          )}

          {/* Revenue chart */}
          {can("revenue")&&(
            <div style={{margin:"10px 14px 0",background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 12px rgba(0,0,0,.06)",border:"1px solid #f1f5f9"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>Revenue Cycle (6 months)</div>
                {can("revenueExport")&&(
                  <button onClick={()=>showToast("Report exported!","success")} style={{fontSize:10,color:role.color,fontWeight:700,background:role.bg,border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer"}}>⬇ Export</button>
                )}
              </div>
              <RevenueChart data={REVENUE.monthly}/>
            </div>
          )}

          {/* Recent claims (if access) */}
          {can("claims")&&(
            <div style={{margin:"10px 14px 0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>Recent Claims</div>
                <button onClick={()=>setTab("claims")} style={{fontSize:11,color:role.color,fontWeight:600,background:"none",border:"none",cursor:"pointer"}}>View All →</button>
              </div>
              {CLAIMS_DATA.slice(0,3).map(c=>{
                const st=STATUS_CFG[c.status];
                return(
                  <div key={c.id} onClick={()=>{setSelectedClaim(c);setTab("claims");}}
                    style={{background:"#fff",borderRadius:12,padding:"11px 13px",marginBottom:7,boxShadow:"0 1px 6px rgba(0,0,0,.05)",border:"1px solid #f1f5f9",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:36,height:36,borderRadius:10,background:st.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,color:st.color,flexShrink:0}}>{st.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,color:"#0f172a",marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.patient}</div>
                      <div style={{fontSize:10,color:"#94a3b8"}}>{c.id} · {c.insurer}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>${c.amount.toLocaleString()}</div>
                      <div style={{fontSize:10,fontWeight:700,color:st.color,background:st.bg,padding:"2px 8px",borderRadius:99}}>{st.label}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Permissions summary card */}
          <div style={{margin:"10px 14px 0",background:"linear-gradient(135deg,#0f172a,#1e1b4b)",borderRadius:14,padding:"14px 16px",marginBottom:90}}>
            <div style={{fontSize:11,fontWeight:700,color:"#a5b4fc",marginBottom:12,textTransform:"uppercase",letterSpacing:.8}}>Your Access Permissions</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {[
                ["Dashboard",     can("dashboard")],
                ["Claims View",   can("claims")],
                ["Claims Edit",   can("claimsEdit")],
                ["Eligibility",   can("eligibility")],
                ["Documents",     can("documents")],
                ["Upload Docs",   can("documentsUpload")],
                ["Delete Docs",   can("documentsDelete")],
                ["Revenue Data",  can("revenue")],
                ["Export Reports",can("revenueExport")],
                ["User Mgmt",     can("userManagement")],
              ].map(([label,allowed])=>(
                <div key={label} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0"}}>
                  <div style={{width:16,height:16,borderRadius:"50%",background:allowed?"rgba(16,185,129,.2)":"rgba(239,68,68,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:allowed?"#10b981":"#ef4444",flexShrink:0,fontWeight:700}}>
                    {allowed?"✓":"✕"}
                  </div>
                  <span style={{fontSize:11,color:allowed?"#94a3b8":"#475569"}}>{label}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      /* ════ CLAIMS LIST ════ */
      const ClaimsList=()=>{
        if(!can("claims")) return <AccessDenied feature="Claims"/>;
        return(
          <div style={{animation:"slideUp .3s ease",padding:"14px"}}>
            <h2 style={{fontSize:19,fontFamily:"Syne,sans-serif",color:"#0f172a",margin:"0 0 12px"}}>Claims</h2>
            <div style={{position:"relative",marginBottom:10}}>
              <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#94a3b8",fontSize:15}}>🔍</span>
              <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Search patient or claim ID…"
                style={{width:"100%",padding:"11px 13px 11px 38px",borderRadius:11,border:"1.5px solid #e2e8f0",fontSize:13,background:"#fff",outline:"none",color:"#0f172a"}}/>
            </div>
            <div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap"}}>
              {["all","approved","pending","denied","review"].map(s=>(
                <button key={s} onClick={()=>setFilterStatus(s)}
                  style={{padding:"5px 12px",borderRadius:99,fontSize:11,fontWeight:600,cursor:"pointer",border:"none",background:filterStatus===s?role.color:"#f1f5f9",color:filterStatus===s?"#fff":"#64748b",transition:"all .2s",textTransform:"capitalize"}}>{s}</button>
              ))}
            </div>
            {filteredClaims.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8",fontSize:13}}>No claims match your search.</div>}
            {filteredClaims.map(c=>{
              const st=STATUS_CFG[c.status];
              return(
                <div key={c.id} onClick={()=>setSelectedClaim(c)}
                  style={{background:"#fff",borderRadius:13,padding:13,marginBottom:9,boxShadow:"0 2px 10px rgba(0,0,0,.06)",border:"1px solid #f1f5f9",cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:9}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,color:"#0f172a",marginBottom:2}}>{c.patient}</div>
                      <div style={{fontSize:10,color:"#94a3b8",fontWeight:500}}>{c.id}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:17,fontWeight:800,color:"#0f172a",fontFamily:"Syne,sans-serif"}}>${c.amount.toLocaleString()}</div>
                      <div style={{fontSize:10,fontWeight:700,color:st.color,background:st.bg,padding:"2px 9px",borderRadius:99,marginTop:2}}>{st.icon} {st.label}</div>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5}}>
                    {[["Insurer",c.insurer],["CPT",c.cpt],["Date",c.date]].map(([k,v])=>(
                      <div key={k} style={{background:"#f8fafc",borderRadius:7,padding:"5px 7px"}}>
                        <div style={{fontSize:8,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.7}}>{k}</div>
                        <div style={{fontSize:10,color:"#374151",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
            <div style={{height:80}}/>
          </div>
        );
      };

      /* ════ CLAIM DETAIL ════ */
      const ClaimDetail=({c})=>{
        const st=STATUS_CFG[c.status];
        const claimDocs=docs.filter(d=>d.claim===c.id);
        return(
          <div style={{animation:"slideUp .3s ease"}}>
            <div style={{background:"linear-gradient(135deg,#0f172a,#1e1b4b)",padding:"20px 15px 38px"}}>
              <button onClick={()=>setSelectedClaim(null)} style={{background:"rgba(255,255,255,.1)",border:"none",color:"#fff",padding:"7px 13px",borderRadius:10,fontSize:12,cursor:"pointer",marginBottom:14}}>← Back</button>
              <div style={{color:"#94a3b8",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>{c.id}</div>
              <div style={{color:"#fff",fontSize:20,fontFamily:"Syne,sans-serif",fontWeight:800,marginTop:3}}>{c.patient}</div>
              <div style={{color:"#a5b4fc",fontSize:12,marginTop:3}}>DOB: {c.dob}</div>
              <div style={{marginTop:10,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:24,fontFamily:"Syne,sans-serif",fontWeight:800,color:"#fff"}}>${c.amount.toLocaleString()}</span>
                <span style={{fontSize:11,fontWeight:700,color:st.color,background:st.bg,padding:"3px 11px",borderRadius:99}}>{st.icon} {st.label}</span>
              </div>
            </div>
            <div style={{margin:"-18px 14px 0",position:"relative",zIndex:1}}>
              <div style={{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 4px 20px rgba(0,0,0,.1)",marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:"#0f172a",marginBottom:10,textTransform:"uppercase",letterSpacing:.8}}>Claim Details</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[["Insurer",c.insurer],["Auth #",c.auth],["CPT Code",c.cpt],["ICD-10",c.icd],["Service Date",c.date],["Filed",c.date]].map(([k,v])=>(
                    <div key={k} style={{background:"#f8fafc",borderRadius:9,padding:"9px 11px"}}>
                      <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:2}}>{k}</div>
                      <div style={{fontSize:12,color:"#0f172a",fontWeight:600}}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Role-gated actions */}
              {c.status==="denied"&&can("claimsEdit")&&(
                <div style={{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 10px rgba(0,0,0,.06)",marginBottom:10,border:"1px solid #fee2e2"}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#ef4444",marginBottom:8}}>⚠ Denied — Appeal Required</div>
                  <button onClick={()=>showToast("Appeal submitted!","success")}
                    style={{width:"100%",background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",border:"none",borderRadius:10,padding:11,fontSize:13,fontWeight:700,cursor:"pointer"}}>Submit Appeal</button>
                </div>
              )}
              {c.status==="denied"&&!can("claimsEdit")&&(
                <div style={{background:"#fff",borderRadius:14,padding:12,marginBottom:10,border:"1px solid #fee2e2"}}>
                  <div style={{fontSize:12,color:"#ef4444",fontWeight:600}}>⚠ Denied — Appeal requires Billing Specialist or higher</div>
                </div>
              )}

              {/* Documents */}
              <div style={{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 10px rgba(0,0,0,.06)",marginBottom:80}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#0f172a",textTransform:"uppercase",letterSpacing:.8}}>Documents ({claimDocs.length})</div>
                  {can("documentsUpload")&&(
                    <button onClick={()=>setShowDocUpload(true)} style={{fontSize:10,color:role.color,fontWeight:700,background:role.bg,border:"none",borderRadius:7,padding:"4px 9px",cursor:"pointer"}}>+ Upload</button>
                  )}
                </div>
                {claimDocs.length===0&&<div style={{fontSize:12,color:"#94a3b8",textAlign:"center",padding:"8px 0"}}>No documents attached</div>}
                {claimDocs.map(d=>(
                  <div key={d.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 9px",background:"#f8fafc",borderRadius:9,marginBottom:5}}>
                    <span style={{fontSize:18}}>{CAT_CFG[d.category]?.icon||"📄"}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,fontWeight:600,color:"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</div>
                      <div style={{fontSize:9,color:"#94a3b8"}}>{d.size} · {d.date}</div>
                    </div>
                    <button onClick={()=>handleDownload(d)} style={{background:role.color,color:"#fff",border:"none",borderRadius:7,padding:"5px 9px",fontSize:11,fontWeight:700,cursor:"pointer"}}>↓</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      };

      /* ════ ELIGIBILITY LIST ════ */
      const EligibilityList=()=>{
        if(!can("eligibility")) return <AccessDenied feature="Eligibility Verification"/>;
        return(
          <div style={{animation:"slideUp .3s ease",padding:"14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h2 style={{fontSize:19,fontFamily:"Syne,sans-serif",color:"#0f172a",margin:0}}>Eligibility (EI)</h2>
              {can("eligibilityVerify")&&(
                <button onClick={()=>showToast("Batch eligibility check running…","info")}
                  style={{background:`linear-gradient(135deg,${role.color},${role.badge})`,color:"#fff",border:"none",borderRadius:10,padding:"7px 13px",fontSize:11,fontWeight:700,cursor:"pointer"}}>⚡ Verify All</button>
              )}
            </div>
            <div style={{background:"linear-gradient(135deg,#0f172a,#1e1b4b)",borderRadius:14,padding:14,marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#a5b4fc",marginBottom:9,textTransform:"uppercase",letterSpacing:.8}}>Real-Time Check</div>
              <input placeholder="Member ID or Patient Name"
                style={{width:"100%",padding:"11px 13px",borderRadius:9,border:"1px solid rgba(255,255,255,.15)",background:"rgba(255,255,255,.08)",color:"#fff",fontSize:13,outline:"none",marginBottom:9}}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:9}}>
                <select style={{padding:"9px 11px",borderRadius:9,border:"1px solid rgba(255,255,255,.15)",background:"rgba(255,255,255,.08)",color:"#94a3b8",fontSize:12,outline:"none"}}>
                  <option>Select Payer</option>
                  <option>BlueCross BlueShield</option>
                  <option>Aetna Health</option>
                  <option>United Healthcare</option>
                  <option>Medicare</option>
                  <option>Cigna</option>
                </select>
                <select style={{padding:"9px 11px",borderRadius:9,border:"1px solid rgba(255,255,255,.15)",background:"rgba(255,255,255,.08)",color:"#94a3b8",fontSize:12,outline:"none"}}>
                  <option>Service Type</option>
                  <option>Medical</option>
                  <option>Mental Health</option>
                  <option>Physical Therapy</option>
                  <option>Surgical</option>
                </select>
              </div>
              {can("eligibilityVerify")
                ? <button onClick={()=>showToast("Eligibility verified!","success")} style={{width:"100%",background:`linear-gradient(135deg,${role.color},${role.badge})`,color:"#fff",border:"none",borderRadius:9,padding:11,fontSize:13,fontWeight:700,cursor:"pointer"}}>Check Eligibility</button>
                : <div style={{textAlign:"center",padding:"9px",fontSize:12,color:"#ef4444",background:"rgba(239,68,68,.1)",borderRadius:9,border:"1px solid rgba(239,68,68,.2)"}}>🔒 Verify permission required</div>
              }
            </div>
            {ELIGIBILITY_DATA.map(e=>{
              const st=STATUS_CFG[e.status];
              return(
                <div key={e.id} onClick={()=>setSelectedEli(e)}
                  style={{background:"#fff",borderRadius:13,padding:13,marginBottom:9,boxShadow:"0 2px 10px rgba(0,0,0,.06)",cursor:"pointer",border:"1px solid #f1f5f9"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{e.patient}</div>
                      <div style={{fontSize:10,color:"#94a3b8"}}>{e.insurer}</div>
                    </div>
                    <div style={{fontSize:10,fontWeight:700,color:st.color,background:st.bg,padding:"3px 11px",borderRadius:99}}>{st.icon} {st.label}</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                    <div style={{background:"#f8fafc",borderRadius:7,padding:"7px 9px"}}>
                      <div style={{fontSize:8,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>Deductible Met</div>
                      <div style={{fontSize:12,fontWeight:700,color:"#0f172a",marginBottom:3}}>${e.deductibleMet} / ${e.deductible}</div>
                      <MiniBar value={e.deductibleMet} max={e.deductible} color={role.color}/>
                    </div>
                    <div style={{background:"#f8fafc",borderRadius:7,padding:"7px 9px"}}>
                      <div style={{fontSize:8,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>OOP Met</div>
                      <div style={{fontSize:12,fontWeight:700,color:"#0f172a",marginBottom:3}}>${e.oopMet} / ${e.oop}</div>
                      <MiniBar value={e.oopMet} max={e.oop} color="#10b981"/>
                    </div>
                  </div>
                  <div style={{fontSize:9,color:"#94a3b8",marginTop:7}}>Verified: {e.verified}</div>
                </div>
              );
            })}
            <div style={{height:80}}/>
          </div>
        );
      };

      const EligibilityDetail=({e})=>(
        <div style={{animation:"slideUp .3s ease"}}>
          <div style={{background:"linear-gradient(135deg,#0f172a,#1e1b4b)",padding:"20px 15px 38px"}}>
            <button onClick={()=>setSelectedEli(null)} style={{background:"rgba(255,255,255,.1)",border:"none",color:"#fff",padding:"7px 13px",borderRadius:10,fontSize:12,cursor:"pointer",marginBottom:14}}>← Back</button>
            <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Insurance Eligibility</div>
            <div style={{color:"#fff",fontSize:20,fontFamily:"Syne,sans-serif",fontWeight:800,marginTop:3}}>{e.patient}</div>
            <div style={{color:"#a5b4fc",fontSize:12,marginTop:3}}>{e.insurer}</div>
            <div style={{display:"flex",gap:9,marginTop:10}}>
              {[["Member ID",e.memberId],["Group",e.groupId]].map(([k,v])=>(
                <div key={k} style={{background:"rgba(255,255,255,.08)",borderRadius:9,padding:"7px 11px"}}>
                  <div style={{fontSize:8,color:"#64748b",fontWeight:700,textTransform:"uppercase"}}>{k}</div>
                  <div style={{fontSize:11,color:"#e2e8f0",fontWeight:700}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{margin:"-18px 14px 0",position:"relative",zIndex:1}}>
            <div style={{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 4px 20px rgba(0,0,0,.1)",marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:"#0f172a",marginBottom:12,textTransform:"uppercase",letterSpacing:.8}}>Benefits Summary</div>
              {[["Copay",e.copay],["Coinsurance",e.coinsurance],["Status","Active"]].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #f1f5f9"}}>
                  <span style={{fontSize:12,color:"#64748b"}}>{k}</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>{v}</span>
                </div>
              ))}
              <div style={{marginTop:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:11,color:"#64748b"}}>Deductible Progress</span>
                  <span style={{fontSize:11,fontWeight:700}}>${e.deductibleMet} / ${e.deductible}</span>
                </div>
                <MiniBar value={e.deductibleMet} max={e.deductible} color={role.color}/>
                <div style={{display:"flex",justifyContent:"space-between",margin:"12px 0 5px"}}>
                  <span style={{fontSize:11,color:"#64748b"}}>Out-of-Pocket Progress</span>
                  <span style={{fontSize:11,fontWeight:700}}>${e.oopMet} / ${e.oop}</span>
                </div>
                <MiniBar value={e.oopMet} max={e.oop} color="#10b981"/>
              </div>
            </div>
            <div style={{height:80}}/>
          </div>
        </div>
      );

      /* ════ DOCUMENTS ════ */
      const Documents=()=>{
        if(!can("documents")) return <AccessDenied feature="Document Management"/>;
        return(
          <div style={{animation:"slideUp .3s ease",padding:"14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h2 style={{fontSize:19,fontFamily:"Syne,sans-serif",color:"#0f172a",margin:0}}>Documents</h2>
              {can("documentsUpload")
                ? <button onClick={()=>setShowDocUpload(true)} style={{background:`linear-gradient(135deg,${role.color},${role.badge})`,color:"#fff",border:"none",borderRadius:10,padding:"7px 13px",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Upload</button>
                : <span style={{fontSize:10,color:"#ef4444",background:"#fee2e2",padding:"4px 10px",borderRadius:99,fontWeight:600}}>🔒 View Only</span>
              }
            </div>
            {showDocUpload&&can("documentsUpload")&&(
              <div style={{background:"#fff",borderRadius:14,padding:18,marginBottom:12,border:`2px dashed ${role.color}`,boxShadow:`0 4px 20px ${role.color}18`}}>
                <input ref={fileRef} type="file" multiple accept=".pdf,.doc,.docx,.jpg,.png" style={{display:"none"}} onChange={e=>handleFileUpload(e.target.files)}/>
                <div onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
                  onDrop={e=>{e.preventDefault();setDragOver(false);handleFileUpload(e.dataTransfer.files);}}
                  onClick={()=>fileRef.current?.click()}
                  style={{textAlign:"center",padding:"18px 0",cursor:"pointer",background:dragOver?`${role.color}08`:"transparent",borderRadius:10,transition:"background .2s"}}>
                  <div style={{fontSize:32,marginBottom:7}}>📤</div>
                  <div style={{fontSize:13,fontWeight:700,color:"#0f172a",marginBottom:3}}>Drag &amp; drop or browse</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>PDF, DOC, JPG, PNG · Max 25 MB</div>
                  <div style={{marginTop:10,background:role.color,color:"#fff",borderRadius:9,padding:"9px 18px",fontSize:12,fontWeight:700,display:"inline-block"}}>Browse Files</div>
                </div>
                <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
                  <button onClick={()=>setShowDocUpload(false)} style={{background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:7,padding:"7px 13px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Cancel</button>
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:7,marginBottom:10,overflowX:"auto",paddingBottom:3}}>
              {["All","Remittance","Authorization","Clinical","Appeal"].map(cat=>(
                <button key={cat} style={{padding:"5px 12px",borderRadius:99,fontSize:10,fontWeight:600,cursor:"pointer",border:"none",background:"#f1f5f9",color:"#64748b",whiteSpace:"nowrap"}}>{cat}</button>
              ))}
            </div>
            {docs.map(d=>(
              <div key={d.id} style={{background:"#fff",borderRadius:13,padding:"11px 13px",marginBottom:7,boxShadow:"0 2px 7px rgba(0,0,0,.05)",border:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:40,height:40,borderRadius:9,background:`${CAT_CFG[d.category]?.color||"#6366f1"}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0}}>
                  {CAT_CFG[d.category]?.icon||"📄"}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</div>
                  <div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{d.type} · {d.size} · {d.date}</div>
                  <div style={{fontSize:9,color:role.color,fontWeight:600,marginTop:1}}>{d.claim}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                  <button onClick={()=>handleDownload(d)} style={{background:role.color,color:"#fff",border:"none",borderRadius:7,padding:"5px 9px",fontSize:11,fontWeight:700,cursor:"pointer"}}>↓</button>
                  {can("documentsDelete")
                    ? <button onClick={()=>handleDeleteDoc(d.id)} style={{background:"#fee2e2",color:"#ef4444",border:"none",borderRadius:7,padding:"5px 9px",fontSize:11,cursor:"pointer"}}>✕</button>
                    : <button onClick={()=>showToast("Delete not permitted for your role","error")} style={{background:"#f1f5f9",color:"#cbd5e1",border:"none",borderRadius:7,padding:"5px 9px",fontSize:11,cursor:"not-allowed"}}>🔒</button>
                  }
                </div>
              </div>
            ))}
            <div style={{height:80}}/>
          </div>
        );
      };

      /* ════ SECURITY & USER MANAGEMENT ════ */
      const Security=()=>(
        <div style={{animation:"slideUp .3s ease",padding:"14px"}}>
          <h2 style={{fontSize:19,fontFamily:"Syne,sans-serif",color:"#0f172a",margin:"0 0 12px"}}>Security &amp; Compliance</h2>

          {/* Session info */}
          <div style={{background:"linear-gradient(135deg,#0f172a,#1e1b4b)",borderRadius:14,padding:16,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
              <div style={{width:48,height:48,borderRadius:13,background:`${role.color}25`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{role.icon}</div>
              <div>
                <div style={{color:"#fff",fontSize:14,fontWeight:700}}>{currentUser.name}</div>
                <RoleBadge roleKey={currentUser.role}/>
              </div>
            </div>
            {[["HIPAA Compliance","Enabled ✓"],["256-bit AES Encryption","Active ✓"],["Audit Logging","Active ✓"],["2FA Status","Enabled ✓"]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,.07)"}}>
                <span style={{fontSize:12,color:"#94a3b8"}}>{k}</span>
                <span style={{fontSize:11,color:"#10b981",fontWeight:700}}>{v}</span>
              </div>
            ))}
          </div>

          {/* PIN */}
          <div style={{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 10px rgba(0,0,0,.06)",marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:700,color:"#0f172a",marginBottom:8}}>Session PIN</div>
            {!showPinSetup?(
              <>
                <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>Set a PIN to quickly lock and unlock your session.</div>
                <button onClick={()=>setShowPinSetup(true)} style={{width:"100%",background:`linear-gradient(135deg,${role.color},${role.badge})`,color:"#fff",border:"none",borderRadius:9,padding:11,fontSize:12,fontWeight:700,cursor:"pointer"}}>{pin?"Change PIN":"Set PIN"}</button>
              </>
            ):(
              <div>
                <input type="password" maxLength={4} value={newPin} onChange={e=>setNewPin(e.target.value.replace(/\D/g,""))} placeholder="Enter 4-digit PIN"
                  style={{width:"100%",padding:"11px 13px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:20,letterSpacing:12,textAlign:"center",outline:"none",marginBottom:9}}/>
                <div style={{display:"flex",gap:7}}>
                  <button onClick={()=>{if(newPin.length===4){setPin(newPin);setNewPin("");setShowPinSetup(false);showToast("PIN set!");}else showToast("PIN must be 4 digits","error");}}
                    style={{flex:1,background:`linear-gradient(135deg,${role.color},${role.badge})`,color:"#fff",border:"none",borderRadius:9,padding:11,fontSize:12,fontWeight:700,cursor:"pointer"}}>Save</button>
                  <button onClick={()=>{setShowPinSetup(false);setNewPin("");}} style={{flex:1,background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:9,padding:11,fontSize:12,fontWeight:700,cursor:"pointer"}}>Cancel</button>
                </div>
              </div>
            )}
          </div>

          {/* Audit log */}
          <div style={{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 10px rgba(0,0,0,.06)",marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:700,color:"#0f172a",marginBottom:9}}>Recent Audit Log {!can("auditFull")&&<span style={{fontSize:10,color:"#94a3b8",fontWeight:400}}>(your activity)</span>}</div>
            {[
              {action:"Eligibility Check",       user:currentUser.name.split(" ")[0]+" "+currentUser.name.split(" ")[1][0]+".", time:"Today 10:22 AM",    type:"query" },
              {action:"Claim Viewed",             user:currentUser.name.split(" ")[0]+" "+currentUser.name.split(" ")[1][0]+".", time:"Today 9:55 AM",     type:"view"  },
              {action:"Document Accessed",        user:currentUser.name.split(" ")[0]+" "+currentUser.name.split(" ")[1][0]+".", time:"Today 9:41 AM",     type:"upload"},
              {action:"Session Started",          user:currentUser.name.split(" ")[0]+" "+currentUser.name.split(" ")[1][0]+".", time:"Today 9:38 AM",     type:"auth"  },
              ...(can("auditFull")?[
                {action:"User Role Modified",     user:"System Admin",                                                            time:"Yesterday 3:05 PM", type:"admin" },
                {action:"Permission Override",    user:"System Admin",                                                            time:"Yesterday 2:41 PM", type:"admin" },
              ]:[]),
            ].map((log,i,arr)=>(
              <div key={i} style={{display:"flex",gap:9,alignItems:"center",padding:"7px 0",borderBottom:i<arr.length-1?"1px solid #f1f5f9":"none"}}>
                <div style={{width:7,height:7,borderRadius:"50%",flexShrink:0,background:{query:"#6366f1",view:"#10b981",upload:"#f59e0b",auth:"#94a3b8",action:"#ef4444",admin:role.color}[log.type]}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,fontWeight:600,color:"#0f172a"}}>{log.action}</div>
                  <div style={{fontSize:9,color:"#94a3b8"}}>{log.user} · {log.time}</div>
                </div>
              </div>
            ))}
          </div>

          {/* User Management — Admin only */}
          {can("userManagement")?(
            <div style={{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 10px rgba(0,0,0,.06)",marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>User Management</div>
                <button onClick={()=>setShowUserMgmt(p=>!p)} style={{fontSize:10,color:role.color,fontWeight:700,background:role.bg,border:"none",borderRadius:7,padding:"4px 9px",cursor:"pointer"}}>{showUserMgmt?"Hide":"View All"}</button>
              </div>
              {showUserMgmt&&DEMO_USERS.map(u=>{
                const r2=ROLES[u.role];
                return(
                  <div key={u.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #f1f5f9"}}>
                    <div style={{width:32,height:32,borderRadius:8,background:`${r2.color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{r2.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>{u.name}</div>
                      <div style={{fontSize:9,color:"#94a3b8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.email}</div>
                    </div>
                    <RoleBadge roleKey={u.role} small/>
                  </div>
                );
              })}
            </div>
          ):(
            <div style={{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 10px rgba(0,0,0,.06)",marginBottom:10,border:"1px solid #f1f5f9"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{fontSize:24}}>🔒</div>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>User Management</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>Admin access required</div>
                </div>
              </div>
            </div>
          )}

          {/* Compliance */}
          <div style={{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 10px rgba(0,0,0,.06)",marginBottom:90}}>
            <div style={{fontSize:12,fontWeight:700,color:"#0f172a",marginBottom:9}}>Compliance Certifications</div>
            {[["HIPAA","Health Insurance Portability and Accountability Act","#10b981"],
              ["SOC 2 II","Service Organization Control","#6366f1"],
              ["HITRUST","Health Information Trust Alliance","#f59e0b"],
              ["PCI DSS","Payment Card Industry Data Security","#8b5cf6"]].map(([cert,full,c])=>(
              <div key={cert} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #f1f5f9"}}>
                <div style={{width:34,height:34,borderRadius:7,background:`${c}18`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:9,color:c,flexShrink:0,textAlign:"center"}}>{cert}</div>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:"#0f172a"}}>{cert}</div>
                  <div style={{fontSize:9,color:"#94a3b8"}}>{full}</div>
                </div>
                <div style={{marginLeft:"auto",width:18,height:18,borderRadius:"50%",background:"#d1fae5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#10b981",fontWeight:700}}>✓</div>
              </div>
            ))}
          </div>
        </div>
      );

      /* ─── Root render ─── */
      return(
        <div style={{minHeight:"100vh",maxWidth:430,margin:"0 auto",background:"#f8fafc",fontFamily:"'DM Sans',sans-serif",position:"relative"}} onClick={resetLockTimer}>
          {toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}
          <Header/>
          <div style={{overflowY:"auto",maxHeight:"calc(100vh - 104px)"}}>
            {tab==="dashboard"   && <Dashboard/>}
            {tab==="claims"      && !selectedClaim && <ClaimsList/>}
            {tab==="claims"      && selectedClaim  && <ClaimDetail c={selectedClaim}/>}
            {tab==="eligibility" && !selectedEli   && <EligibilityList/>}
            {tab==="eligibility" && selectedEli    && <EligibilityDetail e={selectedEli}/>}
            {tab==="documents"   && <Documents/>}
            {tab==="security"    && <Security/>}
          </div>
          <BottomNav/>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════
       ROOT — orchestrates login → app
    ═══════════════════════════════════════════════════════════ */
    function Root(){
      const [currentUser,setCurrentUser]=useState(null);
      const [toast,setToast]=useState(null);
      const showToast=(msg,type="success")=>setToast({message:msg,type});

      if(!currentUser) return(
        <>
          {toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}
          <LoginScreen onLogin={u=>{setCurrentUser(u);showToast(`Welcome back, ${u.name.split(" ")[0]}!`);}}/>
        </>
      );

      return(
        <>
          {toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}
          <InsuranceApp currentUser={currentUser} onLogout={()=>{setCurrentUser(null);showToast("Logged out securely","info");}}/>
        </>
      );
    }

    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Root/>);
  </script>
</body>
</html>
